name: CI/CD Pipeline

on:
  push:
    tags: [ 'v*.*.*' ]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Check Formatting
        run: cargo fmt -- --check
      - name: Run Clippy
        run: cargo clippy -- -Dwarnings
      - name: Run Tests
        run: cargo test --verbose

  release-binary:
    name: Build & Release (${{ matrix.platform.os_name }})
    needs: test-and-lint
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        platform:
          - os_name: Linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: crustoxy
            name: crustoxy-linux-amd64.tar.gz
          - os_name: Linux-x86
            os: ubuntu-latest
            target: i686-unknown-linux-gnu
            bin: crustoxy
            name: crustoxy-linux-x86.tar.gz
          - os_name: Windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: crustoxy.exe
            name: crustoxy-windows-amd64.zip
          - os_name: Windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
            bin: crustoxy.exe
            name: crustoxy-windows-x86.zip

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
      
      - name: Install i686 dependencies (Linux 32-bit)
        if: ${{ matrix.platform.target == 'i686-unknown-linux-gnu' }}
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib build-essential pkg-config libssl-dev:i386

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Build Release
        run: cargo build --release --target ${{ matrix.platform.target }}
      
      - name: Package Release (Linux)
        if: runner.os == 'Linux'
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czvf ../../../${{ matrix.platform.name }} ${{ matrix.platform.bin }}
          
      - name: Package Release (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target\${{ matrix.platform.target }}\release
          Compress-Archive -Path ${{ matrix.platform.bin }} -DestinationPath ..\..\..\${{ matrix.platform.name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.platform.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-docker:
    name: Push Docker Image to GHCR
    needs: test-and-lint
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
